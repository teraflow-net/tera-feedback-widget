<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraFeedback Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; }

    .header { background: #0f172a; color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header__config { display: flex; gap: 8px; align-items: center; }
    .header__config input { padding: 6px 12px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: #fff; font-size: 13px; width: 360px; }
    .header__config button { padding: 6px 16px; border-radius: 6px; border: none; background: #0284c7; color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; }
    .header__config button:hover { background: #0369a1; }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e2e8f0; }
    .stat-card__label { font-size: 12px; color: #64748b; font-weight: 500; margin-bottom: 4px; }
    .stat-card__value { font-size: 28px; font-weight: 700; }
    .stat-card__value--total { color: #0f172a; }
    .stat-card__value--open { color: #f59e0b; }
    .stat-card__value--progress { color: #3b82f6; }
    .stat-card__value--resolved { color: #22c55e; }

    /* Project filter */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #e2e8f0; background: #fff; font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .filter-btn:hover { border-color: #0284c7; color: #0284c7; }
    .filter-btn--active { background: #0284c7; color: #fff; border-color: #0284c7; }
    .filter-btn__count { font-size: 11px; opacity: 0.7; margin-left: 4px; }

    /* Table */
    .table-wrap { background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: #f8fafc; }
    th { text-align: left; padding: 10px 16px; font-weight: 600; color: #475569; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    tr:hover td { background: #f8fafc; }
    .td-status { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    .td-status--open { background: #fef3c7; color: #b45309; }
    .td-status--in_progress { background: #dbeafe; color: #1d4ed8; }
    .td-status--resolved { background: #dcfce7; color: #15803d; }
    .td-content { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .td-image { color: #0284c7; text-decoration: none; font-size: 12px; }
    .td-image:hover { text-decoration: underline; }
    .td-coords { font-size: 11px; color: #94a3b8; font-family: monospace; }
    .td-date { white-space: nowrap; color: #64748b; font-size: 12px; }
    .td-project { font-size: 11px; padding: 2px 8px; background: #f1f5f9; border-radius: 4px; color: #475569; }

    .empty { padding: 60px 20px; text-align: center; color: #94a3b8; font-size: 14px; }

    /* Status tabs */
    .status-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
    .status-tab { padding: 10px 20px; font-size: 13px; font-weight: 500; border: none; background: none; cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; font-family: inherit; }
    .status-tab:hover { color: #334155; }
    .status-tab--active { color: #0284c7; border-bottom-color: #0284c7; }

    /* Loading */
    .loading { padding: 60px 20px; text-align: center; color: #94a3b8; }

    /* Preview link */
    .preview-section { margin-bottom: 24px; background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; padding: 20px; }
    .preview-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .preview-section code { display: block; background: #f1f5f9; padding: 12px 16px; border-radius: 6px; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #334155; }
    .preview-section .copy-btn { margin-top: 8px; padding: 4px 12px; border-radius: 4px; border: 1px solid #e2e8f0; background: #fff; font-size: 12px; cursor: pointer; font-family: inherit; }
    .preview-section .copy-btn:hover { background: #f1f5f9; }
  </style>
</head>
<body>
  <div class="header">
    <h1>TeraFeedback Admin</h1>
    <div class="header__config">
      <input type="text" id="supabaseUrl" placeholder="Supabase URL" />
      <input type="text" id="supabaseKey" placeholder="Supabase Anon Key" style="width:460px" />
      <button onclick="connect()">연결</button>
    </div>
  </div>

  <div class="container">
    <div id="app">
      <div class="loading">Supabase URL과 Anon Key를 입력하고 연결하세요</div>
    </div>
  </div>

  <script type="module">
    import { createClient } from '@supabase/supabase-js'

    let supabase = null
    let allComments = []
    let selectedProject = 'all'
    let selectedStatus = 'all'

    // 기본값 하드코딩 (입력 불필요)
    const DEFAULT_URL = 'https://kixxlhrosxbcwdeofmgg.supabase.co'
    const DEFAULT_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpeHhsaHJvc3hiY3dkZW9mbWdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTI1NDksImV4cCI6MjA5MDEyODU0OX0._XkejZIIt_6XtNMkIo9SjtsLw6ikq5TDTuQd0-YbjxQ'

    // 이전 잘못된 캐시 제거
    localStorage.removeItem('tr_admin_sb_url')
    localStorage.removeItem('tr_admin_sb_key')

    document.getElementById('supabaseUrl').value = DEFAULT_URL
    document.getElementById('supabaseKey').value = DEFAULT_KEY

    // 자동 연결
    setTimeout(() => connect(), 300)

    window.connect = function() {
      const url = document.getElementById('supabaseUrl').value.trim()
      const key = document.getElementById('supabaseKey').value.trim()
      if (!url || !key) return alert('URL과 Key를 입력하세요')

      localStorage.setItem('tr_admin_sb_url', url)
      localStorage.setItem('tr_admin_sb_key', key)

      try {
        supabase = createClient(url, key)
      } catch(e) {
        document.getElementById('app').innerHTML = `<div class="empty">연결 실패: ${e.message}</div>`
        return
      }
      fetchAll()

      // Realtime 구독
      supabase
        .channel('admin_realtime')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'review_comments' }, () => fetchAll())
        .subscribe()
    }

    async function fetchAll() {
      document.getElementById('app').innerHTML = '<div class="loading">로딩 중...</div>'

      const { data, error } = await supabase
        .from('review_comments')
        .select('*')
        .order('created_at', { ascending: false })

      if (error) {
        document.getElementById('app').innerHTML = `<div class="empty">에러: ${error.message}</div>`
        return
      }

      allComments = data || []
      render()
    }

    function render() {
      const projects = [...new Set(allComments.map(c => c.project_id))].sort()

      const filtered = allComments.filter(c => {
        if (selectedProject !== 'all' && c.project_id !== selectedProject) return false
        if (selectedStatus !== 'all' && c.status !== selectedStatus) return false
        return true
      })

      // Stats
      const total = filtered.length
      const open = filtered.filter(c => c.status === 'open').length
      const progress = filtered.filter(c => c.status === 'in_progress').length
      const resolved = filtered.filter(c => c.status === 'resolved').length

      const supabaseUrl = document.getElementById('supabaseUrl').value.trim()
      const supabaseKey = document.getElementById('supabaseKey').value.trim()

      const scriptSnippet = `<script src="https://YOUR_CDN/feedback-widget.iife.js"
  data-project="YOUR_PROJECT_SLUG"
  data-supabase-url="${supabaseUrl}"
  data-supabase-key="${supabaseKey}">
<\/script>`

      document.getElementById('app').innerHTML = `
        <!-- 스크립트 삽입 가이드 -->
        <div class="preview-section">
          <h3>사이트에 위젯 삽입하기</h3>
          <code id="snippet">${escapeHtml(scriptSnippet)}</code>
          <button class="copy-btn" onclick="copySnippet()">복사</button>
          <span style="font-size:12px;color:#64748b;margin-left:8px">data-project 값을 사이트별로 다르게 설정하세요</span>
        </div>

        <!-- 통계 카드 -->
        <div class="stats">
          <div class="stat-card">
            <div class="stat-card__label">전체 피드백</div>
            <div class="stat-card__value stat-card__value--total">${total}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">미처리</div>
            <div class="stat-card__value stat-card__value--open">${open}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">진행중</div>
            <div class="stat-card__value stat-card__value--progress">${progress}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">완료</div>
            <div class="stat-card__value stat-card__value--resolved">${resolved}</div>
          </div>
        </div>

        <!-- 프로젝트 필터 -->
        <div class="filter-bar">
          <button class="filter-btn ${selectedProject === 'all' ? 'filter-btn--active' : ''}" onclick="filterProject('all')">
            전체<span class="filter-btn__count">(${allComments.length})</span>
          </button>
          ${projects.map(p => {
            const cnt = allComments.filter(c => c.project_id === p).length
            return `<button class="filter-btn ${selectedProject === p ? 'filter-btn--active' : ''}" onclick="filterProject('${p}')">
              ${escapeHtml(p)}<span class="filter-btn__count">(${cnt})</span>
            </button>`
          }).join('')}
        </div>

        <!-- 상태 탭 -->
        <div class="status-tabs">
          <button class="status-tab ${selectedStatus === 'all' ? 'status-tab--active' : ''}" onclick="filterStatus('all')">전체 (${total})</button>
          <button class="status-tab ${selectedStatus === 'open' ? 'status-tab--active' : ''}" onclick="filterStatus('open')">미처리 (${open})</button>
          <button class="status-tab ${selectedStatus === 'in_progress' ? 'status-tab--active' : ''}" onclick="filterStatus('in_progress')">진행중 (${progress})</button>
          <button class="status-tab ${selectedStatus === 'resolved' ? 'status-tab--active' : ''}" onclick="filterStatus('resolved')">완료 (${resolved})</button>
        </div>

        <!-- 테이블 -->
        <div class="table-wrap">
          ${filtered.length === 0
            ? '<div class="empty">피드백이 없습니다</div>'
            : `<table>
              <thead>
                <tr>
                  <th>프로젝트</th>
                  <th>페이지</th>
                  <th>상태</th>
                  <th>작성자</th>
                  <th>내용</th>
                  <th>좌표</th>
                  <th>이미지</th>
                  <th>작성일</th>
                </tr>
              </thead>
              <tbody>
                ${filtered.map(c => `
                  <tr>
                    <td><span class="td-project">${escapeHtml(c.project_id)}</span></td>
                    <td>${escapeHtml(c.page_url)}</td>
                    <td><span class="td-status td-status--${c.status}">${statusLabel(c.status)}</span></td>
                    <td>${escapeHtml(c.author_name)}</td>
                    <td><div class="td-content" title="${escapeHtml(c.content)}">${escapeHtml(c.content)}</div></td>
                    <td><span class="td-coords">${Number(c.x_percent).toFixed(1)}%, ${Number(c.y_percent).toFixed(1)}%</span></td>
                    <td>${c.image_url ? `<a class="td-image" href="${c.image_url}" target="_blank">보기</a>` : '-'}</td>
                    <td><span class="td-date">${new Date(c.created_at).toLocaleString('ko-KR')}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>`
          }
        </div>
      `
    }

    window.filterProject = function(p) {
      selectedProject = p
      render()
    }

    window.filterStatus = function(s) {
      selectedStatus = s
      render()
    }

    window.copySnippet = function() {
      const text = document.getElementById('snippet').textContent
      navigator.clipboard.writeText(text)
      const btn = document.querySelector('.copy-btn')
      btn.textContent = '복사됨!'
      setTimeout(() => btn.textContent = '복사', 1500)
    }

    function statusLabel(s) {
      return { open: '미처리', in_progress: '진행중', resolved: '완료' }[s] || s
    }

    function escapeHtml(str) {
      if (!str) return ''
      const div = document.createElement('div')
      div.textContent = str
      return div.innerHTML
    }
  </script>
</body>
</html>
